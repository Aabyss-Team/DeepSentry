name: CI

on:
  push:
    branches: [main, master, "2.0"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify module files
        run: go mod verify

      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...

      - name: Security static analysis
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.28.0 -severity high ./...

      - name: Reachable vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          go build -trimpath -buildvcs=false -o "${RUNNER_TEMP}/deepsentry-audit" ./cmd
          bash scripts/verify-vulnerabilities.sh "${RUNNER_TEMP}/deepsentry-audit"

      - name: Test
        run: go test -count=1 -shuffle=on ./...

      - name: Race detector
        run: go test -race -count=1 ./...

      - name: Cross-platform build
        run: bash build.sh

      - name: Verify release binaries
        run: |
          test "$(find build -maxdepth 1 -type f -name 'deepsentry-*' | wc -l)" -eq 7
          ./build/deepsentry-linux-amd64 --version
          (cd build && shasum -c SHA256SUMS)
