#       EXAMPLE_TOKEN: "xxx"
#     disabled: false
#   - name: remote-docs
#     type: streamable_http
#     url: "https://mcp.example.com/mcp"
#     # 敏感 Token 不写入 YAML，只声明其环境变量名；OAuth 可用 /mcp login remote-docs。
#     bearer_token_env_var: "REMOTE_MCP_TOKEN"
#     headers:
#       X-Workspace: "security"
#     enabled_tools: ["search", "read"]
#     disabled_tools: ["delete"]
#     startup_timeout_sec: 30
#     tool_timeout_sec: 120
#     required: false
#     disabled: false

# Agent 配置自管理说明：
# 用户在 TUI 中要求“添加 skill 路径 / 添加 MCP / 保存 SSH 目标”时，
# Agent 会使用 config_manage 工具更新本机 config.yaml，并在写入前自动备份到
# .deepsentry_backups/config_<timestamp>.yaml。
