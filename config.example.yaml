# 外部 Skills（可选）
# 每个来源目录下面放多个 Skill 子目录，每个 Skill 子目录必须包含 SKILL.md。
# 默认会加载 ./skills 和 ~/.deepsentry/skills；配置 skill_sources 后使用这里声明的目录。
# skill_sources:
#   - "skills"
#   - "~/.deepsentry/skills"
#   - "/opt/deepsentry-skills"
# disabled_skill_sources:
#   - "/opt/old-skills"
# 按 Skill frontmatter 的 name 禁用；不依赖来源路径，也不会被自动加载。
# disabled_skills:
#   - "fun-brainstorming"
# skills_disabled: false  # true 时全局关闭 Skill；等同 TUI 的 /skill off
# 若只想启用一个已发现的 Skill，可在 TUI 使用：/skill only fofamap

# MCP 扩展（可选）
